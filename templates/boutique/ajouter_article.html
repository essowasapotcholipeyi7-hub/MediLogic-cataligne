{% extends "base.html" %}

{% block title %}Ajouter un article{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-lg p-6">
        <div class="text-center mb-6">
            <i class="fas fa-plus-circle text-primary text-4xl"></i>
            <h1 class="text-2xl font-bold text-gray-800 mt-2">Ajouter un article</h1>
            <p class="text-gray-600">Remplissez les informations de votre produit</p>
        </div>

        <form method="POST" enctype="multipart/form-data" id="articleForm">
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Nom de l'article *</label>
                    <input type="text" name="nom" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition"
                           placeholder="Ex: Thermomètre médical">
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Description</label>
                    <textarea name="description" rows="4" 
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition"
                              placeholder="Description détaillée de l'article..."></textarea>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Prix (FCFA) *</label>
                    <input type="number" step="0.01" name="prix" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition"
                           placeholder="0">
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Photos (plusieurs possible)</label>
                    <input type="file" name="photos" multiple accept="image/*" id="photosInput"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition">
                    <p class="text-xs text-gray-500 mt-1">PNG, JPG, JPEG, GIF, WEBP (max 16MB par image)</p>
                    
                    <!-- Aperçu des images -->
                    <div id="previewContainer" class="grid grid-cols-3 gap-2 mt-3"></div>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                    class="w-full mt-6 bg-primary text-white py-3 rounded-lg hover:bg-blue-700 transition font-semibold">
                <span id="btnText"><i class="fas fa-save mr-2"></i> Ajouter l'article</span>
                <span id="btnSpinner" class="hidden"><i class="fas fa-spinner fa-spin mr-2"></i> Upload en cours...</span>
            </button>
        </form>
    </div>
</div>

<script>
// Aperçu des images avant upload
document.getElementById('photosInput').addEventListener('change', function(e) {
    const container = document.getElementById('previewContainer');
    container.innerHTML = '';
    
    const files = Array.from(e.target.files);
    
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(event) {
            const div = document.createElement('div');
            div.className = 'relative';
            div.innerHTML = `
                <img src="${event.target.result}" class="w-full h-24 object-cover rounded-lg">
                <div class="absolute top-1 right-1 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs cursor-pointer" onclick="this.parentElement.remove()">×</div>
            `;
            container.appendChild(div);
        };
        reader.readAsDataURL(file);
    });
});

// Gestion du bouton avec chargement
document.getElementById('articleForm').addEventListener('submit', function() {
    document.getElementById('btnText').classList.add('hidden');
    document.getElementById('btnSpinner').classList.remove('hidden');
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').classList.add('opacity-50', 'cursor-not-allowed');
});
</script>
{% endblock %}
