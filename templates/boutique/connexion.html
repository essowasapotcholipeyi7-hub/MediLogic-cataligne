{% extends "base.html" %}

{% block title %}Connexion boutique{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg">
        <div>
            <div class="flex justify-center">
                <i class="fas fa-store text-primary text-5xl"></i>
            </div>
            <h2 class="mt-4 text-center text-3xl font-extrabold text-gray-900">
                Espace boutique
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Connectez-vous à votre espace de gestion
            </p>
        </div>
        
        <form class="mt-8 space-y-6" method="POST">
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="email" class="block text-gray-700 text-sm font-bold mb-2">
                        <i class="fas fa-envelope mr-1"></i> Email
                    </label>
                    <input id="email" name="email" type="email" required 
                           class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" 
                           placeholder="votre@email.com">
                </div>
                <div>
                    <label for="password" class="block text-gray-700 text-sm font-bold mb-2">
                        <i class="fas fa-lock mr-1"></i> Mot de passe
                    </label>
                    <input id="password" name="mot_de_passe" type="password" required 
                           class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" 
                           placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-sm">
                    <a href="{{ url_for('boutique.mot_passe_oublie') }}" class="text-primary hover:underline">
                        <i class="fas fa-question-circle"></i> Mot de passe oublié ?
                    </a>
                </div>
            </div>

            <button type="submit" 
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-smooth">
                <i class="fas fa-sign-in-alt mr-2"></i>
                Se connecter
            </button>
        </form>

        <p class="text-center text-gray-600 mt-4">
            Pas encore inscrit ? <a href="{{ url_for('boutique.inscription') }}" class="text-primary hover:underline">Créer un compte boutique</a>
        </p>
    </div>
</div>
{% endblock %}
