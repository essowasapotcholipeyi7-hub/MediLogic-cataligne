{% extends "base.html" %}

{% block title %}Mot de passe oublié{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-lg p-6">
        <div class="text-center mb-6">
            <i class="fas fa-key text-primary text-4xl"></i>
            <h1 class="text-2xl font-bold text-gray-800 mt-2">Mot de passe oublié</h1>
            <p class="text-gray-600 mt-1">Réinitialisez votre mot de passe</p>
        </div>

        <form method="POST">
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                    <input type="email" name="email" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition">
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Réponse à la question secrète</label>
                    <input type="text" name="reponse_secrete" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition">
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Nouveau mot de passe</label>
                    <input type="password" name="nouveau_mdp" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition">
                    <p class="text-xs text-gray-500 mt-1">
                        8+ caractères, 1 majuscule, 1 minuscule, 1 chiffre, 1 symbole
                    </p>
                </div>
            </div>

            <button type="submit" 
                    class="w-full mt-6 bg-primary text-white py-2 rounded-lg hover:bg-blue-700 transition">
                <i class="fas fa-redo mr-2"></i> Réinitialiser
            </button>

            <p class="text-center text-gray-600 mt-4">
                <a href="{{ url_for('boutique.connexion') }}" class="text-primary hover:underline">
                    <i class="fas fa-arrow-left mr-1"></i> Retour à la connexion
                </a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
